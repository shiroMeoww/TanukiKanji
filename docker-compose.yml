services:
  postgres:
    image: postgres:15-alpine
    container_name: tanuki-postgres
    environment:
      POSTGRES_DB: tanuki_kanji
      POSTGRES_USER: tanuki_user
      POSTGRES_PASSWORD: tanuki_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tanuki_user -d tanuki_kanji"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tanuki-backend
    environment:
      DATABASE_URL: postgresql://tanuki_user:tanuki_pass@postgres:5432/tanuki_kanji
      NODE_ENV: production
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
